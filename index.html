<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>每日打卡</title>
<style>
:root{--accent:#e8835a}
*,::after,::before{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(145deg,#fdf6ee,#f5ebe0);min-height:100vh;color:#3d2c2c;line-height:1.5;overflow-x:hidden;position:relative}
.bg{position:fixed;pointer-events:none;z-index:0;border-radius:50%;opacity:.08;width:200px;height:200px;background:radial-gradient(circle,#f0c0a0,transparent 70%)}
.b1{top:-40px;right:-60px;animation:fa 8s ease-in-out infinite}
.b2{width:150px;height:150px;background:radial-gradient(circle,#d4b8d8,transparent 70%);bottom:10%;left:-40px;animation:fb 10s ease-in-out infinite}
.b3{width:100px;height:100px;background:radial-gradient(circle,#f8d080,transparent 70%);top:35%;right:-20px;animation:fa 12s ease-in-out infinite}
.b4{width:80px;height:80px;background:radial-gradient(circle,#a8d4b8,transparent 70%);top:15%;left:10%;animation:fb 9s ease-in-out infinite}
.b5{width:60px;height:60px;background:radial-gradient(circle,#f0b8b8,transparent 70%);bottom:25%;right:15%;animation:fa 7s ease-in-out infinite}
@keyframes fa{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-20px)}}
@keyframes fb{0%,100%{transform:translate(0,0)}50%{transform:translate(-12px,18px)}}
@keyframes cfF{0%{opacity:1;transform:translateY(-10px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.container{max-width:520px;margin:0 auto;padding:24px 20px 100px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:20px}.hd-greeting{font-size:14px;color:#b29595;margin-bottom:2px}
.hd-title{font-size:26px;font-weight:700;letter-spacing:.5px;color:#4a3636}.hd-date{font-size:14px;color:#9a7a7a;margin-top:2px}
.hd-summary{margin-top:12px;display:flex;justify-content:center;gap:32px}
.hd-s-item{display:flex;flex-direction:column;align-items:center}
.hd-s-item .num{font-size:26px;font-weight:700;color:var(--accent)}
.hd-s-item .label{font-size:12px;color:#b29595;margin-top:1px}
.mtabs{display:flex;gap:6px;justify-content:center;margin:10px 0 14px}
.mtab{padding:5px 16px;border-radius:20px;border:1.5px solid #e0d5c8;background:transparent;font-size:13px;font-weight:500;color:#b29595;cursor:pointer;transition:all .25s;line-height:1.4}
.mtab:hover{border-color:var(--accent);color:var(--accent)}.mtab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cal-btn{display:inline-flex;align-items:center;gap:5px;background:#fff;border:none;border-radius:10px;padding:6px 14px;font-size:13px;color:#9a7a7a;cursor:pointer;transition:all .2s;margin-top:6px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cal-btn:hover{color:var(--accent)}.cal-box{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);display:none}
.cal-box.show{display:block}.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{display:flex;align-items:center;gap:10px}.cal-nav button{background:none;border:none;cursor:pointer;padding:4px;color:#b29595;font-size:18px;transition:color .2s;display:flex}
.cal-nav button:hover{color:var(--accent)}.cal-nav .cal-lb{font-size:16px;font-weight:600;color:#4a3636;min-width:100px;text-align:center}
.cal-nav button svg{width:20px;height:20px}.cal-stats{font-size:13px;color:#b29595}
.cal-stats .hl{color:var(--accent);font-weight:600}.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;text-align:center}
.cal-wd span{font-size:12px;color:#b29595;padding:4px 0}
.cal-gd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-d{text-align:center;padding:6px 0;font-size:14px;color:#3d2c2c;border-radius:8px;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.cal-d:hover{background:#f5f0ea}.cal-d.off{color:#ddd}.cal-d.tdy{font-weight:700;color:var(--accent)}
.cal-d .dot{width:6px;height:6px;border-radius:50%;margin-top:2px;background:var(--accent)}
.prog-wrap{background:#fff;border-radius:14px;padding:6px 0;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.bar-tr{width:100%;height:8px;background:#f0e8e0;border-radius:6px;overflow:hidden}
.bar-fl{height:100%;background:linear-gradient(90deg,var(--accent),#f0a070);border-radius:6px;transition:width .5s ease;width:0%}
.hlist{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.hcard{background:#fff;border-radius:18px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,.04);display:flex;align-items:center;gap:12px;cursor:pointer;transition:opacity .3s,transform .12s;user-select:none}
.hcard:active{transform:scale(.98)}.hcard.done{opacity:.55}
.hico{font-size:32px;line-height:1;width:44px;text-align:center;flex-shrink:0}
.hinf{flex:1;min-width:0}.hinf .nm{font-size:17px;font-weight:600;color:#3d2c2c}
.hcard.done .hinf .nm{color:#b29595;text-decoration:line-through}
.hinf .sk{font-size:13px;color:#b29595;margin-top:2px}
.hinf .sk .hl{font-weight:700;color:var(--accent)}.hinf .sk .bst{color:#d4a030;font-weight:600}
.chk{width:44px;height:44px;border-radius:50%;border:2.5px solid #e8ddd0;background:#fcf9f6;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:18px;color:transparent;padding:0;z-index:2}
.chk:active{transform:scale(.88)}.chk.done{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(232,131,90,.25)}
.qt-box{background:#fff;border-radius:14px;padding:12px 18px;margin:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.04);text-align:center;border-left:4px solid var(--accent)}
.qt-box .qt{font-size:14px;color:#7a5a5a;font-style:italic;line-height:1.5}
.ms{margin-bottom:14px}.ms-in{background:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 2px 10px rgba(0,0,0,.04);display:flex;justify-content:center;gap:28px}
.ms-it{display:flex;flex-direction:column;align-items:center}
.ms-it .num{font-size:18px;font-weight:700;color:var(--accent)}
.ms-it .label{font-size:11px;color:#b29595;margin-top:1px}
.add{display:flex;gap:10px}
.add input{flex:1;border:2px solid #e0d5c8;border-radius:14px;padding:12px 16px;font-size:15px;outline:none;background:#fff;color:#3d2c2c;transition:border-color .2s}
.add input:focus{border-color:var(--accent)}
.add button{width:48px;height:48px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:26px;font-weight:300;cursor:pointer;flex-shrink:0;transition:background .2s;display:flex;align-items:center;justify-content:center}
.add button:hover{filter:brightness(.92)}
.empty{text-align:center;padding:40px 20px;color:#b29595}.empty .ic{font-size:48px;margin-bottom:8px}.empty p{font-size:15px}
.mbtn{position:fixed;bottom:24px;right:24px;z-index:20;width:46px;height:46px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .25s;padding:0;color:#b29595}
.mbtn:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}.mbtn.on{color:var(--accent)}.mbtn:active{transform:scale(.92)}
.tst{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#3d2c2c;color:#fdf6ee;padding:10px 22px;border-radius:12px;font-size:14px;opacity:0;transition:all .35s ease;pointer-events:none;white-space:nowrap;z-index:10}
.tst.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cf{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100;overflow:hidden}
.cf-p{position:absolute;width:8px;height:8px;border-radius:2px;animation:cfF linear forwards}
@media(max-width:420px){.container{padding:20px 16px 90px}.hd-title{font-size:22px}.hcard{padding:12px 14px}.chk{width:40px;height:40px;font-size:16px}.hico{font-size:28px;width:36px}.ms-in{gap:20px}.mtab{padding:5px 14px;font-size:12px}}
</style>
</head>
