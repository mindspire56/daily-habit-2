<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>&#x6BCF;&#x65E5;&#x6253;&#x5361;</title>
<style>
:root{--accent:#e8835a;--accent-bg:#fdf6ee}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(145deg,var(--accent-bg),#f5ebe0);min-height:100vh;color:#3d2c2c;line-height:1.5;overflow-x:hidden;position:relative;transition:background .4s}
.bg{position:fixed;pointer-events:none;z-index:0;border-radius:50%;opacity:.08}
.b1{width:200px;height:200px;background:radial-gradient(circle,#f0c0a0,transparent 70%);top:-40px;right:-60px;animation:fa 8s ease-in-out infinite}
.b2{width:150px;height:150px;background:radial-gradient(circle,#d4b8d8,transparent 70%);bottom:10%;left:-40px;animation:fb 10s ease-in-out infinite}
.b3{width:100px;height:100px;background:radial-gradient(circle,#f8d080,transparent 70%);top:35%;right:-20px;animation:fa 12s ease-in-out infinite}
.b4{width:80px;height:80px;background:radial-gradient(circle,#a8d4b8,transparent 70%);top:15%;left:10%;animation:fb 9s ease-in-out infinite}
.b5{width:60px;height:60px;background:radial-gradient(circle,#f0b8b8,transparent 70%);bottom:25%;right:15%;animation:fa 7s ease-in-out infinite}
@keyframes fa{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-20px)}}
@keyframes fb{0%,100%{transform:translate(0,0)}50%{transform:translate(-12px,18px)}}
.container{max-width:520px;margin:0 auto;padding:24px 20px 100px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:20px}
.hd-greeting{font-size:14px;color:#b29595;margin-bottom:2px}
.hd-title{font-size:26px;font-weight:700;letter-spacing:.5px;color:#4a3636}
.hd-date{font-size:14px;color:#9a7a7a;margin-top:2px}
.hd-summary{margin-top:12px;display:flex;justify-content:center;gap:32px}
.hd-s-item{display:flex;flex-direction:column;align-items:center}
.hd-s-item .num{font-size:26px;font-weight:700;color:var(--accent);transition:color .4s}
.hd-s-item .label{font-size:12px;color:#b29595;margin-top:1px}
/* Mode tabs */
.mtabs{display:flex;gap:6px;justify-content:center;margin:12px 0 16px}
.mtab{padding:6px 18px;border-radius:20px;border:1.5px solid #e0d5c8;background:transparent;font-size:13px;font-weight:500;color:#b29595;cursor:pointer;transition:all .25s;line-height:1.4}
.mtab:hover{border-color:var(--accent);color:var(--accent)}
.mtab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cal-btn{display:inline-flex;align-items:center;gap:5px;background:#fff;border:none;border-radius:10px;padding:6px 14px;font-size:13px;color:#9a7a7a;cursor:pointer;transition:all .2s;margin-top:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cal-btn:hover{color:var(--accent)}
.cal-box{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);display:none}
.cal-box.show{display:block}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-nav button{background:none;border:none;cursor:pointer;padding:4px;color:#b29595;font-size:18px;transition:color .2s;display:flex}
.cal-nav button:hover{color:var(--accent)}
.cal-nav .cal-lb{font-size:16px;font-weight:600;color:#4a3636;min-width:100px;text-align:center}
.cal-nav button svg{width:20px;height:20px}
.cal-stats{font-size:13px;color:#b29595}
.cal-stats .hl{color:var(--accent);font-weight:600}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;text-align:center}
.cal-wd span{font-size:12px;color:#b29595;padding:4px 0}
.cal-gd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-d{text-align:center;padding:6px 0;font-size:14px;color:#3d2c2c;border-radius:8px;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.cal-d:hover{background:#f5f0ea}
.cal-d.off{color:#ddd}
.cal-d.tdy{font-weight:700;color:var(--accent)}
.cal-d .dot{width:6px;height:6px;border-radius:50%;margin-top:2px;background:var(--accent)}
/* Drawer */
.dw-ol{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:30;opacity:0;pointer-events:none;transition:opacity .3s}
.dw-ol.show{opacity:1;pointer-events:auto}
.dw{position:fixed;top:0;right:-340px;width:320px;height:100%;background:#fff;z-index:31;box-shadow:-4px 0 20px rgba(0,0,0,.08);transition:right .3s ease;padding:24px 20px;overflow-y:auto}
.dw.show{right:0}
.dw-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;background:transparent;cursor:pointer;font-size:20px;color:#b29595;display:flex;align-items:center;justify-content:center;border-radius:50%}
.dw-close:hover{background:#f5f0ea}
.dw-date{font-size:18px;font-weight:700;color:#4a3636}
.dw-weekday{font-size:13px;color:#b29595;margin-top:2px}
.dw-habits{margin-top:16px;list-style:none}
.dw-habits li{padding:8px 0;border-bottom:1px solid #f5f0ea;display:flex;align-items:center;gap:10px;font-size:14px}
.dw-habits li .d{color:var(--accent);font-weight:600}
.dw-streak{margin-top:14px;font-size:14px;color:#b29595}
.dw-streak .hl{color:var(--accent);font-weight:600}
.dw-diary{margin-top:14px;padding:12px;background:#faf7f3;border-radius:10px;font-size:13px;color:#7a5a5a;line-height:1.5}
.prog-wrap{background:#fff;border-radius:14px;padding:6px 0;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.bar-tr{width:100%;height:8px;background:#f0e8e0;border-radius:6px;overflow:hidden}
.bar-fl{height:100%;background:linear-gradient(90deg,var(--accent),#f0a070);border-radius:6px;transition:width .5s ease,background .4s;width:0%}
.hlist{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.hcard{background:#fff;border-radius:18px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,.04);display:flex;align-items:center;gap:12px;cursor:pointer;transition:opacity .3s,transform .12s;user-select:none}
.hcard:active{transform:scale(.98)}.hcard.done{opacity:.55}
.hico{font-size:32px;line-height:1;width:44px;text-align:center;flex-shrink:0}
.hinf{flex:1;min-width:0}
.hinf .nm{font-size:17px;font-weight:600;color:#3d2c2c}
.hcard.done .hinf .nm{color:#b29595;text-decoration:line-through}
.hinf .sk{font-size:13px;color:#b29595;margin-top:2px}
.hinf .sk .hl{font-weight:700;color:var(--accent)}
.hinf .sk .bst{color:#d4a030;font-weight:600}
.chk{width:44px;height:44px;border-radius:50%;border:2.5px solid #e8ddd0;background:#fcf9f6;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:18px;color:transparent;padding:0;z-index:2}
.chk:active{transform:scale(.88)}
.chk.done{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(232,131,90,.25)}
.skip-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid #e8ddd0;background:#fcf9f6;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#b29595;transition:all .2s;padding:0;z-index:2}
.skip-btn:hover{border-color:var(--accent);color:var(--accent);background:#fef7f2}
.skip-btn:active{transform:scale(.9)}
.skip-btn:disabled{opacity:.3;cursor:default}
.qt-box{background:#fff;border-radius:14px;padding:12px 18px;margin:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.04);text-align:center;border-left:4px solid var(--accent);transition:border-color .4s}
.qt-box .qt{font-size:14px;color:#7a5a5a;font-style:italic;line-height:1.5}
.ms{margin-bottom:14px}
.ms-in{background:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 2px 10px rgba(0,0,0,.04);display:flex;justify-content:center;gap:28px}
.ms-it{display:flex;flex-direction:column;align-items:center}
.ms-it .num{font-size:18px;font-weight:700;color:var(--accent);transition:color .4s}
.ms-it .label{font-size:11px;color:#b29595;margin-top:1px}
.add{display:flex;gap:10px}
.add input{flex:1;border:2px solid #e8ddd0;border-radius:14px;padding:12px 16px;font-size:15px;outline:none;background:#fff;color:#3d2c2c;transition:border-color .2s}
.add input:focus{border-color:var(--accent)}
.add button{width:48px;height:48px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:26px;font-weight:300;cursor:pointer;flex-shrink:0;transition:background .2s;display:flex;align-items:center;justify-content:center}
.add button:hover{filter:brightness(.92)}
.empty{text-align:center;padding:40px 20px;color:#b29595}
.empty .ic{font-size:48px;margin-bottom:8px}.empty p{font-size:15px}
.mbtn{position:fixed;bottom:24px;right:24px;z-index:20;width:46px;height:46px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .25s;padding:0;color:#b29595}
.mbtn:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}.mbtn.on{color:var(--accent);box-shadow:0 3px 14px rgba(232,131,90,.2)}
.mbtn:active{transform:scale(.92)}
.tst{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#3d2c2c;color:#fdf6ee;padding:10px 22px;border-radius:12px;font-size:14px;opacity:0;transition:all .35s ease;pointer-events:none;white-space:nowrap;z-index:10}
.tst.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cf{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100;overflow:hidden}
.cf-p{position:absolute;width:8px;height:8px;border-radius:2px;animation:cfF linear forwards}
@keyframes cfF{0%{opacity:1;transform:translateY(-10px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
@media(max-width:420px){.container{padding:20px 16px 90px}.hd-title{font-size:22px}.hcard{padding:12px 14px}.chk{width:40px;height:40px;font-size:16px}.hico{font-size:28px;width:36px}.hinf .nm{font-size:15px}.ms-in{gap:20px}.dw{width:100%;right:-100%}.mtab{padding:5px 14px;font-size:12px}}
</style>
</head>
<body>
<div class="bg b1"></div><div class="bg b2"></div><div class="bg b3"></div><div class="bg b4"></div><div class="bg b5"></div>
<div class="container">
<div class="header">
<div class="hd-greeting" id="greet"></div>
<div class="hd-title">&#x1F4CB; &#x6BCF;&#x65E5;&#x6253;&#x5361;</div>
<div class="hd-date" id="dt"></div>
<div class="hd-summary">
<div class="hd-s-item"><span class="num" id="dc">0</span><span class="label">&#x5DF2;&#x5B8C;&#x6210;</span></div>

</div>

<button class="cal-btn" id="calBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> &#x6253;&#x5361;&#x65E5;&#x5386;</button>
</div>

<div class="cal-top"><div class="cal-nav"><button id="calP"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button><span class="cal-lb" id="calLb"></span><button id="calN"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button></div><div class="cal-stats" id="calSt"></div></div>
<div class="cal-wd"><span>&#x65E5;</span><span>&#x4E00;</span><span>&#x4E8C;</span><span>&#x4E09;</span><span>&#x56DB;</span><span>&#x4E94;</span><span>&#x516D;</span></div>

</div>

<div class="ms"><div class="ms-in">
<div class="ms-it"><span class="num" id="msMd">0</span><span class="label">&#x672C;&#x6708;&#x6253;&#x5361;</span></div>
<div class="ms-it"><span class="num" id="msBs">0</span><span class="label">&#x6700;&#x957F;&#x8FDE;&#x7EED;</span></div>
<div class="ms-it"><span class="num" id="msTc">0</span><span class="label">&#x7D2F;&#x8BA1;&#x5B8C;&#x6210;</span></div>
</div></div>
<div class="add"><input id="inp" type="text" placeholder="&#x6DFB;&#x52A0;&#x65B0;&#x4E60;&#x60EF;&#x2026;" maxlength="20" autocomplete="off"><button id="addBtn">+</button></div>
</div>
<div class="dw-ol" id="dwOl"></div><div class="dw" id="dw"><button class="dw-close" id="dwClose">&#x2716;</button><div id="dwBody"></div></div>
<button class="mbtn" id="mbtn">&#x1F3B5;</button>
<audio id="bgm" loop preload="none"><source src="background.mp3" type="audio/mpeg"></audio>
<div class="tst" id="tst"></div><script>
(function(){
var ST='dh_v2',T=function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
var MK=function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')};
// Default data
var DH=[
{id:'read',name:'\u9605\u8BFB',e:'\uD83D\uDCD6',en:'low',co:'indoor',ca:'mind',mi:'\u8BFB1\u9875\u4E66',wb:false},
{id:'run',name:'\u8DD1\u6B65',e:'\uD83C\uDFC3',en:'high',co:'outdoor',ca:'body',mi:'\u5FEB\u8D705\u5206\u949F',wb:true},
{id:'water',name:'\u559D\u6C34',e:'\uD83D\uDCA7',en:'low',co:'any',ca:'rest',mi:'\u559D\u4E00\u53E3\u6C34',wb:false},
{id:'meditate',name:'\u5191\u60F3',e:'\uD83E\uDDD8',en:'low',co:'indoor',ca:'rest',mi:'\u6DF1\u547C\u54381\u5206\u949F',wb:false},
{id:'stretch',name:'\u62C9\u4F38',e:'\uD83E\uDDB8',en:'low',co:'indoor',ca:'rest',mi:'\u4F38\u5C551\u5206\u949F',wb:false},
{id:'code',name:'\u7F16\u7A0B',e:'\uD83D\uDCBB',en:'high',co:'indoor',ca:'mind',mi:'\u5199\u4EE3\u7801',wb:false},
{id:'write',name:'\u5199\u4F5C',e:'\u270D\uFE0F',en:'low',co:'indoor',ca:'mind',mi:'\u5199\u51E0\u53E5\u8BDD',wb:false},
];
var DM={
focus:{lb:'\u4E13\u6CE8',ids:['read','meditate','code','write'],col:'#e8835a'},
rest:{lb:'\u6062\u590D',ids:['stretch','water','meditate'],col:'#7dbf7d'},
learn:{lb:'\u5B66\u4E60',ids:['read','write'],col:'#e8c84a'},
};
function LD(){
try{
var r=localStorage.getItem(ST);if(r)return JSON.parse(r);
// Try migrating old data
var old=localStorage.getItem('dh_data');
if(old){
var o=JSON.parse(old);
if(o.habits){
var nd={version:2,habits:DH.map(function(x){return{id:x.id,name:x.name,emoji:x.e,energy:x.en,condition:x.co,category:x.ca,minVersion:x.mi,weekendBonus:x.wb}}),modes:DM,activeMode:'focus',dailyLog:{},skipLog:{},settings:{maxSkips:5,sugEnabled:true,imgDays:90}};
o.habits.forEach(function(h){
var nid='h'+h.id;
var mh=DH.find(function(x){return x.name===h.name});
var hid=mh?mh.id:nid;
if(h.history)Object.keys(h.history).forEach(function(d){
if(!nd.dailyLog[d])nd.dailyLog[d]={habits:[],streak:0,diary:null};
nd.dailyLog[d].habits.push({id:hid,done:true,time:''})
});
});
localStorage.removeItem('dh_data');localStorage.setItem(ST,JSON.stringify(nd));return nd
}}}catch(e){}
return{version:2,habits:DH.map(function(x){return{id:x.id,name:x.name,emoji:x.e,energy:x.en,condition:x.co,category:x.ca,minVersion:x.mi,weekendBonus:x.wb}}),modes:DM,activeMode:'focus',dailyLog:{},skipLog:{},settings:{maxSkips:5,sugEnabled:true,imgDays:90}}
}
var AD=LD();function SV(){localStorage.setItem(ST,JSON.stringify(AD))}

// Helper: get current mode's habit IDs
function curModeIds(){var m=AD.modes[AD.activeMode];return m?m.ids:[]}
// Helper: get today's log
function todayLog(){var t=T();if(!AD.dailyLog[t])AD.dailyLog[t]={habits:[],streak:0,diary:null};return AD.dailyLog[t]}
// Helper: check if a habit is done today
function isDone(id){return todayLog().habits.some(function(h){return h.id===id&&h.done})}
// Streak calc
function calcStreak(){var s=0,d=new Date();while(true){var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');var lg=AD.dailyLog[k];if(lg&&lg.habits.some(function(h){return h.done})){s++;d.setDate(d.getDate()-1)}else break}AD.dailyLog[T()].streak=s;return s}
function bestStreak(){var b=0;var ds=Object.keys(AD.dailyLog).sort();var c=1;for(var i=1;i<ds.length;i++){var lg=AD.dailyLog[ds[i]];if(lg&&lg.habits.some(function(h){return h.done})){var df=(new Date(ds[i])-new Date(ds[i-1]))/(864e5);if(df===1){c++}else{b=Math.max(b,c);c=1}}else{b=Math.max(b,c);c=1}}return Math.max(b,c)}
function monthDays(){var p=MK(),c=0;Object.keys(AD.dailyLog).forEach(function(k){if(k.startsWith(p)&&AD.dailyLog[k].habits.some(function(h){return h.done}))c++});return c}
function totalDone(){var c=0;Object.keys(AD.dailyLog).forEach(function(k){AD.dailyLog[k].habits.forEach(function(h){if(h.done)c++})});return c}

var QS=['\u575A\u6301\u4E0D\u662F\u4E00\u6B21\u8F70\u8F70\u70C8\u70C8\u7684\u884C\u52A8\uFF0C\u800C\u662F\u6BCF\u5929\u91CD\u590D\u7684\u5C0F\u4E8B \uD83D\uDC22','\u4ECA\u5929\u7684\u4F60\uFF0C\u6BD4\u6628\u5929\u591A\u4E86\u4E00\u70B9\u70B9 \u2728','\u4E0D\u79EF\u8DEC\u6B65\uFF0C\u65E0\u4EE5\u81F3\u5343\u91CC \uD83D\uDEB6','\u81EA\u5F8B\u5373\u81EA\u7531 \uD83D\uDD4A\uFE0F','\u751F\u547D\u5FC5\u987B\u6709\u88C2\u7F1D\uFF0C\u9633\u5149\u624D\u80FD\u7167\u8FDB\u6765 \uD83C\uDF04','\u4E0D\u7ECF\u4E00\u756A\u5BD2\u5F7B\u9AA8\uFF0C\u600E\u5F97\u6885\u82B1\u6251\u9F3B\u9999 \uD83C\uDF3F','\u79CD\u4E00\u68F5\u6811\u6700\u597D\u7684\u65F6\u95F4\u662F\u5341\u5E74\u524D \uD83C\uDF33','\u4F60\u662F\u6700\u68D2\u7684\uFF01 \uD83C\uDF1F','\u9053\u963B\u4E14\u957F\uFF0C\u884C\u5219\u5C06\u81F3 \uD83C\uDF04','\u8868\u626C\u4F60\u7684\u575A\u6301 \uD83C\uDFC5'];
var GQ=function(){return QS[Math.floor(Math.random()*QS.length)]};
var WD=['\u65E5','\u4E00','\u4E8C','\u4E09','\u56DB','\u4E94','\u516D'];
var GR=['\uD83C\uDF19 \u591C\u6DF1\u4E86','\uD83C\uDF05 \u65E9\u4E0A\u597D','\u2600\uFE0F \u4E0A\u5348\u597D','\uD83C\uDF24\uFE0F \u4E2D\u5348\u597D','\uD83C\uDF24\uFE0F \u4E0B\u5348\u597D','\uD83C\uDF07 \u508D\u665A\u597D','\uD83C\uDF19 \u665A\u4E0A\u597D'];
var GT=function(){var h=new Date().getHours();if(h<6)return GR[0];if(h<9)return GR[1];if(h<12)return GR[2];if(h<14)return GR[3];if(h<18)return GR[4];if(h<21)return GR[5];return GR[6]};
var ESC=function(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML};
var calO=false,calY,calM,prevP=-1;
var daysSince=function(id){var ds=Object.keys(AD.dailyLog).sort().reverse();for(var i=0;i<ds.length;i++){var lg=AD.dailyLog[ds[i]];if(lg.habits.some(function(h){return h.id===id&&h.done}))return i}return 999};

// === RENDER ===
function R(){
var n=new Date();document.getElementById('greet').textContent=GT();
document.getElementById('dt').textContent=n.getFullYear()+'\u5E74'+(n.getMonth()+1)+'\u6708'+n.getDate()+'\u65E5  \u661F\u671F'+WD[n.getDay()];
document.getElementById('qt').textContent=GQ();
// Mode tabs
var mt=document.getElementById('mtabs');var mh='';
Object.keys(AD.modes).forEach(function(k){var m=AD.modes[k];mh+='<button class="mtab'+(k===AD.activeMode?' on':'')+'" data-mode="'+k+'">'+m.lb+'</button>'});
mt.innerHTML=mh;
// Today's stats
var modeIds=curModeIds();var habits=AD.habits.filter(function(h){return modeIds.indexOf(h.id)>=0});
var tl=todayLog();var dc=0;habits.forEach(function(h){if(isDone(h.id))dc++});
var tt=habits.length;document.getElementById('dc').textContent=dc;document.getElementById('tc').textContent=tt;
var p=tt>0?Math.round(dc/tt*100):0;document.getElementById('pf').style.width=p+'%';
// Accent color
var m=AD.modes[AD.activeMode];if(m){document.documentElement.style.setProperty('--accent',m.col);document.documentElement.style.setProperty('--accent-bg',m.col+'22')}
// Confetti
if(p===100&&p!==prevP&&tt>0){CF()}prevP=p;
document.getElementById('msMd').textContent=monthDays();document.getElementById('msBs').textContent=bestStreak();document.getElementById('msTc').textContent=totalDone();
// Habit list
var el=document.getElementById('hl');
if(tt===0){el.innerHTML='<div class="empty"><div class="ic">\u2728</div><p>\u8FD8\u6CA1\u6709\u4E60\u60EF\uFF0C\u6DFB\u52A0\u4E00\u4E2A\u5F00\u59CB\u6253\u5361\u5427</p></div>';return}
var skips=AD.skipLog[T()]||[];var skipCount=skips.length;var maxSkips=AD.settings.maxSkips||5;
var hh='';habits.forEach(function(h){var d=isDone(h.id),s=calcStreak(),b=bestStreak();hh+='<div class="hcard'+(d?' done':'')+'" data-id="'+h.id+'"><div class="hico">'+(h.emoji||'\u2B50')+'</div><div class="hinf"><div class="nm">'+ESC(h.name)+'</div><div class="sk">'+(s>0?'\uD83D\uDD25 \u8FDE\u7EED <span class="hl">'+s+'</span> \u5929':'\u2615 \u4ECA\u5929\u5F00\u59CB\u79EF\u7D2F')+(b>1?' \u00B7 \u6700\u9AD8 <span class="bst">'+b+'</span> \u5929':'')+'</div></div><div class="chk'+(d?' done':'')+'" data-a="t"><span>'+(d?'\u2713':'')+'</span></div><button class="skip-btn" data-a="s"'+(skipCount>=maxSkips?' disabled':'')+'>\u21BB</button></div>'});
el.innerHTML=hh;
if(calO)RC()}

function RC(){
var y=calY,m=calM;document.getElementById('calLb').textContent=y+'\u5E74'+(m+1)+'\u6708';
var fd=new Date(y,m,1).getDay();var dim=new Date(y,m+1,0).getDate();var ts=T();var mc=0;
for(var d=1;d<=dim;d++){var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var lg=AD.dailyLog[k];if(lg&&lg.habits.some(function(h){return h.done}))mc++}
document.getElementById('calSt').innerHTML='\u672C\u6708\u6253\u5361 <span class="hl">'+mc+'</span> \u5929';
var h='';for(var i=0;i<fd;i++)h+='<div class="cal-d off"></div>';
for(var d=1;d<=dim;d++){var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var lg=AD.dailyLog[k];var has=lg&&lg.habits.some(function(h){return h.done});h+='<div class="cal-d'+(k===ts?' tdy':'')+'" data-date="'+k+'"><span>'+d+'</span>'+(has?'<span class="dot"></span>':'')+'</div>'}
document.getElementById('calGd').innerHTML=h}

function openDrawer(ds){
var lg=AD.dailyLog[ds];if(!lg)lg={habits:[],streak:0,diary:null};
var d=new Date(ds);var wd=WD[d.getDay()];
var h='<div class="dw-date">'+ds+'</div><div class="dw-weekday">\u661F\u671F'+wd+'</div><div class="dw-streak">\u5F53\u524D\u8FDE\u7EED <span class="hl">'+calcStreak()+'</span> \u5929</div>';
if(lg.habits.length>0){h+='<ul class="dw-habits">';lg.habits.forEach(function(x){h+='<li><span class="d">'+(x.done?'\u2713':'\u25CB')+'</span>'+ESC(x.name||x.id)+(x.time?' <span style="color:#b29595;font-size:12px">'+x.time+'</span>':'')+'</li>'});h+='</ul>'}else{h+='<div style="margin-top:14px;color:#b29595;font-size:14px">\u65E0\u8BB0\u5F55</div>'}
if(lg.diary){h+='<div class="dw-diary">'+lg.diary.text.substring(0,20)+(lg.diary.text.length>20?'...':'')+'</div>'}
document.getElementById('dwBody').innerHTML=h;
document.getElementById('dwOl').classList.add('show');document.getElementById('dw').classList.add('show')}
function closeDrawer(){document.getElementById('dwOl').classList.remove('show');document.getElementById('dw').classList.remove('show')}
function TC(){calO=!calO;document.getElementById('calBox').classList.toggle('show',calO);if(calO){var n=new Date();calY=n.getFullYear();calM=n.getMonth();RC()}}

function TG(id){
var tl=todayLog();var idx=tl.habits.findIndex(function(h){return h.id===id});
if(idx>=0){if(tl.habits[idx].done)tl.habits[idx].done=false;else tl.habits[idx].done=true}else{tl.habits.push({id:id,done:true,time:''})}
calcStreak();SV();R()}
function SK(id){
var t=T();if(!AD.skipLog[t])AD.skipLog[t]=[];
if(AD.skipLog[t].indexOf(id)<0&&(AD.skipLog[t].length<AD.settings.maxSkips)){AD.skipLog[t].push(id);SV();R()}
// Auto-skip to another habit from same mode
var modeIds=curModeIds();var skips=AD.skipLog[t];
var avail=modeIds.filter(function(x){return skips.indexOf(x)<0});
if(avail.length>0){var pick=avail[Math.floor(Math.random()*avail.length)];TG(pick)}
showToast('\u5DF2\u66FF\u6362')}
function ADH(nm){nm=nm.trim();if(!nm){showToast('\u8BF7\u8F93\u5165\u4E60\u60EF\u540D\u79F0');return}
var exists=AD.habits.some(function(h){return h.name===nm});if(exists){showToast('\u5DF2\u6709\u8FD9\u4E2A\u4E60\u60EF');return}
var maxId=0;AD.habits.forEach(function(h){var n=parseInt(h.id.replace('h',''));if(n>maxId)maxId=n});
var e='\u2B50';var HM=[['\u559D\u6C34','\u6C34','\u996E','\uD83D\uDCA7'],['\u559D\u8336','\u8336','\uD83C\uDF75'],['\u8FD0\u52A8','\u8DD1\u6B65','\u8DD1','\uD83C\uDFC3'],['\u5065\u8EAB','\uD83D\uDCAA'],['\u8BFB\u4E66','\u9605\u8BFB','\u770B\u4E66','\uD83D\uDCD6'],['\u5B66\u4E60','\u5B66','\uD83D\uDCDA'],['\u82F1\u8BED','\u5355\u8BCD','\uD83D\uDD24'],['\u5199\u4F5C','\u5199','\u270D\uFE0F'],['\u73A9\u6E38\u620F','\u6E38\u620F','\uD83C\uDFAE'],['\u770B\u7535\u89C6\u5267','\u8FFD\u5267','\uD83D\uDCFA'],['\u753B\u753B','\u7ED8\u753B','\uD83C\uDFA8'],['\u505A\u996D','\u70F9\u996A','\uD83C\uDF73'],['\u62C9\u4F38','\uD83E\uDDB8'],['\u6563\u6B65','\u8D70\u8D70','\uD83D\uDEB6']];
var n2=nm.toLowerCase();for(var i=0;i<HM.length;i++){for(var j=0;j<HM[i].length-1;j++){if(n2.indexOf(HM[i][j].toLowerCase())>=0){e=HM[i][HM[i].length-1];break}}}
AD.habits.push({id:'h'+(maxId+1),name:nm,emoji:e,energy:'low',condition:'any',category:'other',minVersion:'',weekendBonus:false});
AD.modes[AD.activeMode].ids.push('h'+(maxId+1));SV();R();document.getElementById('inp').value='';showToast('\u5DF2\u6DFB\u52A0')}
function DL(id){AD.habits=AD.habits.filter(function(x){return x.id!==id});Object.keys(AD.dailyLog).forEach(function(k){AD.dailyLog[k].habits=AD.dailyLog[k].habits.filter(function(x){return x.id!==id})});SV();R();TS("已删除")}function TS(m){var el=document.getElementById('tst');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show')},1800)}
function CF(){var cs=['#e8835a','#f0a070','#f8d080','#a8d4b8','#d4b8d8','#f0b8b8','#8ec0e0'];var c=document.createElement('div');c.className='cf';for(var i<40;i++){var p=document.createElement('div');p.className='cf-p';p.style.left=Math.random()*100+'%';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(4+Math.random()*6)+'px';p.style.height=(4+Math.random()*6)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.animationDuration=(1.5+Math.random()*2)+'s';p.style.animationDelay=Math.random()*.8+'s';c.appendChild(p)}document.body.appendChild(c);setTimeout(function(){c.remove()},4000)}

// === EVENTS ===
document.getElementById('hl').addEventListener('click',function(e){
var db=e.target.closest('[data-a="d"]');if(db){var c=db.closest('.hcard');if(c)DL(Number(c.dataset.id));return}
var sk=e.target.closest('[data-a="s"]');if(sk){var c=sk.closest('.hcard');if(c&&!sk.disabled)SK(c.dataset.id);return}
var c=e.target.closest('.hcard');if(c)TG(c.dataset.id)});
document.getElementById('mtabs').addEventListener('click',function(e){
var b=e.target.closest('.mtab');if(!b)return;AD.activeMode=b.dataset.mode;
AD.skipLog[T()]=[];SV();R()});
document.getElementById('calBtn').addEventListener('click',TC);
document.getElementById('calP').addEventListener('click',function(){calM--;if(calM<0){calM=11;calY--}RC()});
document.getElementById('calN').addEventListener('click',function(){var n=new Date();if(calY===n.getFullYear()&&calM===n.getMonth())return;calM++;if(calM>11){calM=0;calY++}RC()});
document.getElementById('calGd').addEventListener('click',function(e){
var d=e.target.closest('.cal-d');if(d&&d.dataset.date)openDrawer(d.dataset.date)});
document.getElementById('dwOl').addEventListener('click',closeDrawer);
document.getElementById('dwClose').addEventListener('click',closeDrawer);
document.getElementById('addBtn').addEventListener('click',function(){ADH(document.getElementById('inp').value)});
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter'){ADH(e.target.value);e.target.value=''}});

var mp=false,ae=document.getElementById('bgm'),mb=document.getElementById('mbtn');ae.volume=.3;
mb.addEventListener('click',function(){if(mp){ae.pause();mp=false;mb.classList.remove('on')}else{ae.play().then(function(){mp=true;mb.classList.add('on')}).catch(function(){})}});
R();})();
</script>
</body>
